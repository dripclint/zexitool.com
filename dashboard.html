<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEXI TOOL | Premium Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <div id="auth-guard" class="auth-guard" style="display: flex;">
        <div class="loader-spinner"></div>
        <h2 id="auth-status-text">AUTHENTICATING...</h2>
    </div>

    <main id="app" class="app-container">
        
        <header class="app-header">
            <h1 class="logo">ZEXI<span class="text-accent">TOOL</span></h1>
            
            <div class="user-controls" style="display: flex; flex-direction: column; align-items: flex-end; gap: 6px;">
                <div class="user-status-wrapper" style="display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 20px; border: 1px solid #2a2a2a;">
                    <span id="login-status-dot" style="width: 8px; height: 8px; background: #2a9d8f; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px #2a9d8f;"></span>
                    <div class="user-email" id="display-user-email" style="font-size: 0.85rem; color: #fff; font-weight: 600; letter-spacing: 0.5px;">loading...</div>
                </div>
                
                <button id="btn-logout" class="btn-logout ripple" title="Logout" style="background: rgba(230, 57, 70, 0.1); border: 1px solid #e63946; color: #e63946; padding: 4px 12px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 700; transition: all 0.2s;">
                    <i class="fa-solid fa-power-off"></i> LOGOUT
                </button>
            </div>
        </header>

        <section id="page-home" class="page active">
            <div class="balance-card">
                <p class="label">WALLET BALANCE</p>
                <h2 class="balance-amount text-accent">₹<span id="wallet-balance">0.00</span></h2>
                <p class="status-text text-success"><i class="fa-solid fa-link"></i> Live Synced</p>
            </div>

            <div class="quick-actions">
                <button class="btn btn-outline ripple" onclick="app.navigate('deposit')">
                    <i class="fa-solid fa-wallet"></i> DEPOSIT
                </button>
                <button class="btn btn-primary ripple" onclick="app.navigate('buy')">
                    <i class="fa-solid fa-cart-shopping"></i> BUY KEY
                </button>
            </div>

            <h3 class="section-title">RECENT ACTIVITY</h3>
            <div id="home-recent-activity" class="list-container skeleton-container"></div>
        </section>

        <section id="page-deposit" class="page">
            <h2 class="page-title">ADD FUNDS</h2>
            
            <div class="card form-card">
                <div class="deposit-content">
                    
                    <div class="deposit-tabs-wrapper" id="deposit-tabs">
                        <button class="tab active" onclick="app.switchDepositTab('upi')">UPI</button>
                        <button class="tab" onclick="app.switchDepositTab('binance')">BINANCE PAY</button>
                    </div>

                    <div class="qr-container">
                        <div class="qr-box">
                            <div class="qr-scanner-line"></div>
                            <img id="deposit-qr" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=admin@upi" alt="Payment QR">
                        </div>
                        <p class="text-muted mt-3" id="deposit-method-desc" style="font-weight: 600;">Scan to pay via UPI</p>
                    </div>

                    <div class="form-group mt-3">
                        <label>Amount (INR) - Min ₹100</label>
                        <input type="number" id="dep-amount" placeholder="Enter amount..." class="input-field" min="100">
                    </div>
                    
                    <div class="form-group">
                        <label id="lbl-utr">UTR / Transaction ID (12 Digits)</label>
                        <input type="text" id="dep-utr" placeholder="Enter 12-digit UTR..." class="input-field" maxlength="12">
                    </div>
                    
                    <button id="btn-submit-deposit" class="btn btn-primary btn-block ripple mt-2">
                        SUBMIT REQUEST
                    </button>
                </div>
            </div>

            <h3 class="section-title">PENDING DEPOSITS</h3>
            <div id="deposit-list" class="list-container"></div>
        </section>

        <section id="page-buy" class="page">
            <h2 class="page-title">STORE</h2>
            <div id="product-list" class="grid-container"></div>
        </section>

        <section id="page-keys" class="page">
            <h2 class="page-title">MY KEYS</h2>
            <div id="keys-list" class="list-container"></div>
        </section>

        <section id="page-history" class="page">
            <h2 class="page-title">TRANSACTIONS</h2>
            <div id="history-list" class="list-container"></div>
        </section>

    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" data-target="home"><i class="fa-solid fa-house"></i><span>Home</span></button>
        <button class="nav-item" data-target="deposit"><i class="fa-solid fa-wallet"></i><span>Deposit</span></button>
        <button class="nav-item" data-target="buy"><i class="fa-solid fa-store"></i><span>Store</span></button>
        <button class="nav-item" data-target="keys"><i class="fa-solid fa-key"></i><span>Keys</span></button>
        <button class="nav-item" data-target="history"><i class="fa-solid fa-clock-rotate-left"></i><span>History</span></button>
    </nav>

    <div id="toast-container" class="toast-container"></div>

    <div id="purchase-modal" class="modal">
        <div class="modal-content scale-in">
            <span class="close-modal" onclick="app.closePurchaseModal()">&times;</span>
            <h3 id="modal-product-name" class="text-accent mb-2">PRODUCT NAME</h3>
            
            <div id="modal-duration-select-area">
                <div class="form-group mt-3">
                    <label>Select Duration</label>
                    <div id="modal-pricing-options" class="pricing-grid"></div>
                </div>
            </div>

            <div class="summary-box mt-3">
                <span>Total Cost:</span>
                <span class="text-accent" style="font-size: 1.5rem; font-weight: 700;">₹<span id="modal-total-price">0</span></span>
            </div>

            <button id="btn-confirm-purchase" class="btn btn-primary btn-block ripple mt-3">
                PAY FROM WALLET
            </button>
        </div>
    </div>

    <div id="video-modal" class="modal">
        <div class="modal-content scale-in">
            <span class="close-modal" onclick="app.closeVideoModal()">&times;</span>
            <video id="preview-video" controls autoplay></video>
        </div>
    </div>

    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
